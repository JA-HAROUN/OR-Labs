<div id="get-map-size">
    <h1>Get Map Size</h1>
    <div id="inputs">
        <label for="rows">Rows:</label>
        <input type="number" id="rows" [value]="rows" (input)="rows = $any($event.target).valueAsNumber" min="1" max="50">
        <label for="columns">Columns:</label>
        <input type="number" id="columns" [value]="columns" (input)="columns = $any($event.target).valueAsNumber" min="1" max="50">
    </div>
    <div id="buttons">
        <button id="change-role" class="btn btn-secondary" (click)="changeRole()">Change Role</button>
        <button id="generate-map" class="btn btn-primary" (click)="generateMatrix()">Generate Map</button>
    </div>
</div>
