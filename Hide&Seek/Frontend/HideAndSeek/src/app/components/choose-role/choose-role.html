<div id="choose-role">
    <h1>Hide &amp; Seek</h1>
    <p class="subtitle">Choose your role to begin</p>
    <div id="roles">
        <button id="hider" (click)="chooseRole('hider')">Hider</button>
        <button id="third" (click)="chooseRole('third')">Third Person</button>
        <button id="seeker" (click)="chooseRole('seeker')">Seeker</button>
    </div>
</div>
